<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso Intensivo de Ofimática 2026 | UniSalamanca</title>
    <meta name="description" content="Curso práctico de Microsoft 365 para carreras administrativas. Domina Word, Excel, PowerPoint y más.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside>
        <div class="logo-container">
            <h1>Ofimática 2026</h1>
            <p style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 0.5rem;">UniSalamanca — Administración</p>
        </div>
        <nav class="nav-links" id="sidebar-nav">
            <!-- Nav items will be injected here -->
        </nav>
        <div style="padding: 1.5rem; border-top: 1px solid var(--glass-border);">
            <p style="font-size: 0.75rem; color: var(--text-secondary);">Elaborado por:</p>
            <p style="font-size: 0.8rem; font-weight: 600;">Jesús Reinaldo Barros Bolívar</p>
        </div>
    </aside>

    <div id="progress-container" style="position: fixed; top: 0; left: 300px; right: 0; height: 4px; background: var(--glass); z-index: 1000;">
        <div id="progress-bar" style="height: 100%; width: 0%; background: linear-gradient(to right, var(--accent-blue), var(--accent-purple)); transition: width 0.4s ease;"></div>
    </div>

    <main id="course-content">
        <!-- Content will be injected here -->
    </main>

    <script type="module" src="app.js"></script>

</html>
